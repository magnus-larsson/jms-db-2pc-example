services:
  postgres:
    image: postgres:16
    container_name: jms-db-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    command: postgres -c max_prepared_transactions=100
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  ibmmq:
    image: icr.io/ibm-messaging/mq:latest
    platform: linux/amd64
    container_name: jms-db-ibmmq
    ports:
      - "1414:1414"  # MQ listener port
      - "9443:9443"  # MQ Web Console
    environment:
      LICENSE: accept
      MQ_QMGR_NAME: QM1
      MQ_APP_PASSWORD: passw0rd
      MQ_ENABLE_EMBEDDED_WEB_SERVER: "true"
    volumes:
      - ibmmq-data:/mnt/mqm
      - ./mq-config/20-dev.mqsc:/etc/mqm/20-dev.mqsc:ro
    healthcheck:
      test: ["CMD", "dspmq"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  ibmmq-data:
